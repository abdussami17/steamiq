<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Event Modal</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
  Create Event
</button>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Create Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- ================= BASIC INFO ================= -->
        <h5 class="mb-3">Basic Info</h5>

        <div class="row g-3">
          <div class="col-md-6">
            <label>Event Name</label>
            <input class="form-control">
          </div>

          <div class="col-md-6">
            <label>Event Type</label>
            <select id="eventType" class="form-select">
              <option value="">Select Type</option>
              <option value="esports">Steam Esports</option>
              <option value="xr">Steam XR Sports</option>
            </select>
          </div>

          <div class="col-md-6">
            <label>Location</label>
            <input class="form-control">
          </div>

          <div class="col-md-3">
            <label>Start Date</label>
            <input type="date" class="form-control">
          </div>

          <div class="col-md-3">
            <label>End Date</label>
            <input type="date" class="form-control">
          </div>

          <div class="col-md-4">
            <label>Status</label>
            <select class="form-select">
              <option>Draft</option>
              <option>Publish</option>
            </select>
          </div>
        </div>

        <hr>

        <!-- ================= ESPORTS SECTION ================= -->
        <div id="esportsSection" style="display:none">

          <h5>Brain Game Settings</h5>

          <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="brainToggle">
            <label class="form-check-label">Enable Brain Game</label>
          </div>

          <div id="brainFields" class="row g-3" style="display:none">
            <div class="col-md-4">
              <label>Brain Type</label>
              <select class="form-select">
                <option>Math</option>
                <option>Science</option>
                <option>Technology</option>
                <option>Engineering</option>
              </select>
            </div>

            <div class="col-md-4">
              <label>Score</label>
              <input type="number" class="form-control">
            </div>

            <div class="col-md-4">
              <label>Team Power-up</label>
              <input class="form-control">
            </div>
          </div>

          <hr>

          <h5>Game Settings</h5>

          <div class="row g-3">

            <div class="col-md-4">
              <label>Game</label>
              <select class="form-select">
                <option>Aqua Ball League</option>
              </select>
            </div>

            <div class="col-md-4">
              <label>Players Per Team</label>
              <select class="form-select">
                <option>2</option>
                <option>3</option>
              </select>
            </div>

            <div class="col-md-4">
              <label>Match Rule</label>
              <input class="form-control" value="Best of 3 (2 wins)" readonly>
            </div>

            <div class="col-md-6">
              <label>Points Per Win</label>
              <select class="form-select">
                <option>250</option>
                <option>500</option>
                <option>1000</option>
                <option>5000</option>
              </select>
            </div>

            <div class="col-md-6">
              <label>Points Per Draw</label>
              <select class="form-select">
                <option>0</option>
                <option>250</option>
                <option>500</option>
              </select>
            </div>
          </div>

          <hr>

          <h5>Tournament Setup</h5>

          <div class="row g-3">
            <div class="col-md-6">
              <label>Tournament Type</label>
              <select class="form-select">
                <option>Single Elimination</option>
              </select>
            </div>

            <div class="col-md-6">
              <label>Number of Teams</label>
              <input type="number" class="form-control">
            </div>
          </div>

        </div>

        <!-- ================= XR SECTION ================= -->
        <div id="xrSection" style="display:none">

          <h5>Activities</h5>

          <button class="btn btn-success mb-3" onclick="addActivity()">Add Activity</button>

          <div id="activitiesContainer"></div>

        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary">Save Event</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const eventType = document.getElementById("eventType");
const esportsSection = document.getElementById("esportsSection");
const xrSection = document.getElementById("xrSection");

eventType.addEventListener("change", function () {

  esportsSection.style.display = "none";
  xrSection.style.display = "none";

  if (this.value === "esports") {
    esportsSection.style.display = "block";
  }

  if (this.value === "xr") {
    xrSection.style.display = "block";
  }
});

document.getElementById("brainToggle").addEventListener("change", function () {
  document.getElementById("brainFields").style.display = this.checked ? "flex" : "none";
});

function addActivity() {

  const container = document.getElementById("activitiesContainer");

  const div = document.createElement("div");
  div.className = "row g-3 border rounded p-3 mb-3";

  div.innerHTML = `
    <div class="col-md-4">
      <select class="form-select activityType" onchange="toggleGame(this)">
        <option>Science</option>
        <option>Technology</option>
        <option>Engineering</option>
        <option>Art</option>
        <option>Math</option>
        <option>Playground</option>
        <option>Esports</option>
      </select>
    </div>

    <div class="col-md-3">
      <input type="number" class="form-control" placeholder="Score">
    </div>

    <div class="col-md-3">
      <input type="number" class="form-control" placeholder="Points">
    </div>

    <div class="col-md-2">
      <button class="btn btn-danger" onclick="this.parentElement.parentElement.remove()">Remove</button>
    </div>

    <div class="col-12 gameSettings" style="display:none">
      <hr>
      <label>Game</label>
      <select class="form-select">
        <option>Aqua Ball League</option>
      </select>
    </div>
  `;

  container.appendChild(div);
}

function toggleGame(select) {
  const gameSection = select.closest(".row").querySelector(".gameSettings");
  gameSection.style.display = select.value === "Esports" ? "block" : "none";
}
</script>

</body>
</html>
